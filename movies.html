<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera - Cine ISTEA</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/movies.css">
    <script defer src="/js/HeaderController.js"></script>
    <script defer type="module" src="/js/db/DisplayMovies.js"></script>
</head>

<body>
    <header>
        <h1>ISTEA</h1>
        <nav>
            <ul>
                <li><a id="header-inicio" href="#">Inicio</a></li>
                <li><a id="header-cartelera" href="#">Cartelera</a></li>
                <li><a id="header-administrar" href="#">Administrar</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="movies-container">
            <div class="filters-bar">
                <h2 class="page-title">Cartelera</h2>

                <div class="filter-group">
                    <label class="filter-title" for="genero">Género</label>
                    <select id="genero" class="filter-select">
                        <option value="">Todos</option>
                        <option value="action">Acción</option>
                        <option value="adventure">Aventura</option>
                        <option value="comedy">Comedia</option>
                        <option value="drama">Drama</option>
                        <option value="horror">Terror</option>
                        <option value="sci-fi">Ciencia Ficción</option>
                        <option value="thriller">Suspenso</option>
                        <option value="romance">Romance</option>
                        <option value="animation">Animación</option>
                        <option value="documentary">Documental</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-title" for="clasificacion">Clasificación</label>
                    <select id="clasificacion" class="filter-select">
                        <option value="">Todas</option>
                        <option value="atp">ATP</option>
                        <option value="13">+13</option>
                        <option value="18">+18</option>
                    </select>
                </div>

                <div class="filter-group filter-search">
                    <input class="filter-input" placeholder="Buscar pelicula" type="text">
                </div>
            </div>

            <div id="movies-grid" class="movies-grid">
                <!-- cargo las peliculas desde DisplayMovies.js -->
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Cine ISTEA. Todos los derechos reservados.</p>
    </footer>
</body>

</html>
