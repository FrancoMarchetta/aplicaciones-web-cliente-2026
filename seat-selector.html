<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccionar Asientos - Cine ISTEA</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/seat-selector.css">
</head>

<body>
    <header>
        <h1>ISTEA</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="movies.html">Cartelera</a></li>
                <li><a href="#">Administrar</a></li>
            </ul>
        </nav>

    <main>
        <div class="seat-selector">
            <div class="pelicula-header">
                <h1>Nombre de Película</h1>
                <p class="horario-info">Jue 16 | 20:00</p>
                <div class="seat-divider"></div>
            </div>

            <div class="seat-content">
                <div class="seat-layout">
                    <div class="screen-indicator">PANTALLA</div>

                    <div class="seat-zones">
                        <div class="seat-zone">
                            <div class="seat-row">
                                <input type="checkbox" id="s1" class="seat-input">
                                <label for="s1" class="seat-label">A1</label>
                                <input type="checkbox" id="s2" class="seat-input">
                                <label for="s2" class="seat-label">A2</label>
                                <input type="checkbox" id="s3" class="seat-input">
                                <label for="s3" class="seat-label">A3</label>
                            </div>
                            <div class="seat-row">
                                <input type="checkbox" id="s4" class="seat-input">
                                <label for="s4" class="seat-label">B1</label>
                                <input type="checkbox" id="s5" class="seat-input">
                                <label for="s5" class="seat-label">B2</label>
                                <input type="checkbox" id="s6" class="seat-input">
                                <label for="s6" class="seat-label">B3</label>
                            </div>
                            <div class="seat-row">
                                <input type="checkbox" id="s7" class="seat-input">
                                <label for="s7" class="seat-label">C1</label>
                                <input type="checkbox" id="s8" class="seat-input">
                                <label for="s8" class="seat-label">C2</label>
                                <input type="checkbox" id="s9" class="seat-input">
                                <label for="s9" class="seat-label">C3</label>
                            </div>
                            <div class="seat-row">
                                <input type="checkbox" id="s10" class="seat-input">
                                <label for="s10" class="seat-label">D1</label>
                                <input type="checkbox" id="s11" class="seat-input">
                                <label for="s11" class="seat-label">D2</label>
                                <input type="checkbox" id="s12" class="seat-input">
                                <label for="s12" class="seat-label">D3</label>
                            </div>
                        </div>

                        <div class="seat-aisle">PASILLO</div>

                        <div class="seat-zone">
                            <div class="seat-row">
                                <input type="checkbox" id="s13" class="seat-input">
                                <label for="s13" class="seat-label">A4</label>
                                <input type="checkbox" id="s14" class="seat-input">
                                <label for="s14" class="seat-label">A5</label>
                                <input type="checkbox" id="s15" class="seat-input">

                                <input type="checkbox" id="s16" class="seat-input">
                                <label for="s16" class="seat-label">A7</label>
                                <input type="checkbox" id="s17" class="seat-input">
                                <label for="s17" class="seat-label">A8</label>
                                <input type="checkbox" id="s18" class="seat-input">
                                <label for="s18" class="seat-label">A9</label>
                            </div>
                            <div class="seat-row">
                                <input type="checkbox" id="s19" class="seat-input">
                                <label for="s19" class="seat-label">B4</label>
                                <input type="checkbox" id="s20" class="seat-input">
                                <label for="s20" class="seat-label">B5</label>
                                <input type="checkbox" id="s21" class="seat-input">
                                <label for="s21" class="seat-label">B6</label>
                                <input type="checkbox" id="s22" class="seat-input">
                                <label for="s22" class="seat-label">B7</label>
                                <input type="checkbox" id="s23" class="seat-input">
                                <label for="s23" class="seat-label">B8</label>
                                <input type="checkbox" id="s24" class="seat-input">
                                <label for="s24" class="seat-label">B9</label>
                            </div>
                            <div class="seat-row">
                                <input type="checkbox" id="s25" class="seat-input">
                                <label for="s25" class="seat-label">C4</label>
                                <input type="checkbox" id="s26" class="seat-input">
                                <label for="s26" class="seat-label">C5</label>
                                <input type="checkbox" id="s27" class="seat-input">
                                <label for="s27" class="seat-label">C6</label>
                                <input type="checkbox" id="s28" class="seat-input">
                                <label for="s28" class="seat-label">C7</label>
                                <input type="checkbox" id="s29" class="seat-input">
                                <label for="s29" class="seat-label">C8</label>
                                <input type="checkbox" id="s30" class="seat-input">

                                <input type="checkbox" id="s36" class="seat-input">
                                <label for="s36" class="seat-label">D9</label>
                            </div>
                        </div>

                        <div class="seat-aisle">PASILLO</div>

                        <div class="seat-zone">
                            <div class="seat-row">
                                <input type="checkbox" id="s37" class="seat-input">
                                <label for="s37" class="seat-label">A10</label>
                                <input type="checkbox" id="s38" class="seat-input">
                                <label for="s38" class="seat-label">A11</label>
                                <input type="checkbox" id="s39" class="seat-input">
                                <label for="s39" class="seat-label">A12</label>
                            </div>
                            <div class="seat-row">
                                <input type="checkbox" id="s40" class="seat-input">
                                <label for="s40" class="seat-label">B10</label>
                                <input type="checkbox" id="s41" class="seat-input">
                                <label for="s41" class="seat-label">B11</label>
                                <input type="checkbox" id="s42" class="seat-input">
                                <label for="s42" class="seat-label">B12</label>
                            </div>
                            <div class="seat-row">
                                <input type="checkbox" id="s43" class="seat-input">
                                <label for="s43" class="seat-label">C10</label>
                                <input type="checkbox" id="s44" class="seat-input">

                                <label for="s48" class="seat-label">D12</label>
                            </div>
                        </div>
                    </div>

                    <div class="glosario">
                        <div class="glosario-item">
                            <div class="glosario-seat available"></div>
                            <span>Disponible</span>
                        </div>
                        <div class="glosario-item">
                            <div class="glosario-seat occupied"></div>
                            <span>Ocupado</span>
                        </div>
                        <div class="glosario-item">
                            <div class="glosario-seat selected"></div>
                            <span>Seleccionado</span>
                        </div>
                    </div>
                </div>

                <aside class="resumen-compra">
                    <h3>Resumen</h3>
                    <div class="price-row">
                        <span>Entradas (0)</span>
                        <span>$0</span>
                    </div>
                    <div class="price-row">
                        <span>Servicio</span>
                        <span>$500</span>
                    </div>
                    <div class="price-row total">
                        <span>Total</span>
                        <span>$0</span>
                    </div>
                    <button type="button" class="resumen-btn">Continuar al pago</button>
                </aside>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Cine ISTEA. Todos los derechos reservados.</p>
    </footer>
</body>

</html>
