<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
    <script defer src="/js/header-controller.js"></script>
    <script defer type="module" src="/js/db/display-movies.js"></script>

    <title>Admin Panel - Cinema Management</title>
</head>

<body>
    <header>
        <h1>ISTEA</h1>
        <nav>
            <ul>
                <li><a id="header-inicio" href="#">Inicio</a></li>
                <li><a id="header-cartelera" href="#">Cartelera</a></li>
                <li><a id="header-administrar" href="#">Administrar</a></li>
            </ul>
        </nav>

    </header>


    <main class="main-content">
        <div class="content-header">
            <div>
                <h2>Gestionar peliculas</h2>
            </div>

            <div style="  display: grid ;gap: 1rem;">
                <div class="search-box">
                    <input type="text" placeholder="Search film archives...">
                </div>
                <a href="/form.html">
                    <button class="btn-add-movie">Nueva Pelicula</button>
                </a>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <label>Peliculas totales</label>
                <div class="value">142</div>
            </div>
            <div class="stat-card">
                <label>peliculas disponibles</label>
                <div class="value">28</div>
            </div>
            <div class="stat-card">
                <label>Archivados</label>
                <div class="value">100</div>
            </div>
        </div>
        <div class="table-container">
            <table class="movie-table">
                <thead>
                    <tr>
                        <th>POSTER</th>
                        <th>NOMBRE</th>
                        <th>GÉNERO</th>
                        <th>ESTRENO</th>
                        <th>DIRECTOR</th>
                        <th>REPARTO</th>
                        <th>SINOPSIS</th>
                        <th>CLASIFICACIÓN</th>
                        <th>VISIBILIDAD</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Peliculas se cargan en display-movies.js -->
                </tbody>
            </table>
        </div>
    </main>

    <dialog closedby="any" id="deleteModal">
        <div class="modal-box">
            <h3>¿Eliminar película?</h3>
            <p id="modalMovieTitle"></p>
            <div class="modal-actions">
                <button id="modalCancelBtn" class="btn-modal cancel">Cancelar</button>
                <button id="modalConfirmBtn" class="btn-modal confirm">Eliminar</button>
            </div>
        </div>
    </dialog>
</body>

</html>
